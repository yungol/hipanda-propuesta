<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR - Cámara G Política</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #fff;
}
</style>
</head>
<body>
<div id="qr"></div>
<script>
new QRCode(document.getElementById('qr'), {
  text: 'https://yungol.github.io/hipanda-propuesta/camaragpolitica.html',
  width: 300,
  height: 300,
  correctLevel: QRCode.CorrectLevel.M
});
</script>
</body>
</html>
